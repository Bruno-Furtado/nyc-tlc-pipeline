version: 2
updates:
  # Python dependencies (requirements.txt + requirements-dev.txt at the repo root).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(config)"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:chore"
    commit-message:
      prefix: "ci"

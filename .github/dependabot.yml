version: 2
updates:
  # Python dependencies (requirements.txt + requirements-dev.txt at the repo root).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:chore"
    commit-message:
      prefix: "chore(config)"
    # Free Edition needs databricks-connect==18.1.* (pinned in CLAUDE.md); Dependabot
    # cannot resolve that pin and keeps proposing a downgrade, so we ignore it here.
    ignore:
      - dependency-name: "databricks-connect"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:chore"
    commit-message:
      prefix: "ci"

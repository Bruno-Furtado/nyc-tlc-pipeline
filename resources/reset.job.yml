# On-demand cleanup: drop the whole catalog to start fresh (then re-run the pipeline to rebuild).
resources:
  jobs:
    nyc_tlc_reset:
      name: nyc-tlc-reset
      description: Drop the target catalog (cascade) to reset to a clean slate.
      email_notifications:
        on_success:
          - ${var.alert_email}
        on_failure:
          - ${var.alert_email}
        on_duration_warning_threshold_exceeded:
          - ${var.alert_email}
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 1200 # 20 min; reset normally finishes in seconds, so this is just a safety net
      parameters:
        - name: catalog
          default: ${var.catalog}
      tasks:
        - task_key: reset
          spark_python_task:
            python_file: ../src/pipeline/reset.py
            parameters: ["--catalog", "{{job.parameters.catalog}}"]
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "2" # serverless environment version (reset needs no extra deps)
